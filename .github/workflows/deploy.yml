name: Deploy demo site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Link theme for demo build
        run: |
          mkdir -p exampleSite/themes
          ln -s ../.. exampleSite/themes/walnuts-n-zola

      - name: Build demo with Zola
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/project \
            -w /project/exampleSite \
            ghcr.io/getzola/zola:v0.19.2 \
            build --base-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./exampleSite/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
