name: Deploy site

on:
  push:
    branches: [main]
  schedule:
    # Midnight CET (23:00 UTC summer / 00:00 UTC winter) — 05:00 UTC covers CET midnight in winter
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Select dishes of the day
        run: python3 scripts/dishes_of_the_day.py

      - name: Build with Zola
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace \
            ghcr.io/getzola/zola:v0.19.2 \
            build --base-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
