name: Deploy site

on:
  push:
    branches: [main]
  schedule:
    # Midnight CET (23:00 UTC summer / 00:00 UTC winter) — 05:00 UTC covers CET midnight in winter
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zola
        uses: getzola/zola@v0.19.2

      - name: Select dishes of the day
        run: python3 scripts/dishes_of_the_day.py

      - name: Build
        run: zola build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
